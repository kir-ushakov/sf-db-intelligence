services:
  app:
    build: .
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      # localhost in .env is the container itself; reach host MySQL via Docker Desktop / extra_hosts.
      MYSQL_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
